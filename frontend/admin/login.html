<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Masuk - Warkop Ayah</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <h2 class="login-title">Admin Akses</h2>
            <p class="login-subtitle">Masuk untuk mengelola sistem Warkop Ayah</p>

            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Masukkan username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <div id="login-error" class="error-msg"></div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">Login Sistem</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="../index.html" class="exit-link">Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
